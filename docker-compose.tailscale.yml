services:
  study-timer-http:
    image: nginx:alpine
    container_name: study-timer-http
    restart: unless-stopped
    ports:
      # Tailnet 인터페이스에만 노출. LAN/외부 차단.
      - "${TAILSCALE_IP}:8765:80"
    volumes:
      # study-timer-data를 nginx 이미지의 기본 html 경로가 아닌 /srv/study-timer에
      # mount → 빈 볼륨이 nginx 기본 파일로 오염되는 것을 회피
      - study-timer-data:/srv/study-timer:ro
      - ./study-timer-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

# study-timer-data 볼륨의 top-level 선언은 메인 docker-compose.yml에 있음
# (start.sh가 항상 -f docker-compose.yml -f docker-compose.tailscale.yml 순서로
# 머지하므로 여기서 재선언/external 표기를 하면 오히려 메인의 생성 정의를 덮어
# 볼륨 부재 시 "external volume not found" 에러 발생).
