server {
    listen 80;
    server_name _;
    # nginx 이미지의 기본 html 경로(/usr/share/nginx/html)와 분리해 빈 named volume이
    # 처음 mount될 때 nginx 기본 파일(index.html / 50x.html)이 study-timer-data로
    # 복사되는 것을 방지
    root /srv/study-timer;

    location / {
        autoindex on;
        autoindex_format json;
        add_header Cache-Control "no-cache";
    }
}
