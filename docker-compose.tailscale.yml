services:
  study-timer-http:
    image: nginx:alpine
    container_name: study-timer-http
    restart: unless-stopped
    ports:
      # Tailnet 인터페이스에만 노출. LAN/외부 차단.
      - "${TAILSCALE_IP}:8765:80"
    volumes:
      - study-timer-data:/usr/share/nginx/html:ro
      - ./study-timer-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  study-timer-data:
    name: study-timer-data
    external: true
