services:
  vscode-tunnel:
    build:
      context: .
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:24.04}
        # ROS2 Jazzy 설치 여부. start.sh / reload.sh 가 Linux 호스트(우분투 PC)에서
        # INSTALL_ROS=true 를 export 하며, Mac 에서는 미설정이라 false 로 스킵된다.
        INSTALL_ROS: ${INSTALL_ROS:-false}
    container_name: vscode-tunnel
    restart: unless-stopped
    # PyTorch DataLoader 멀티워커 등에서 /dev/shm 기본 64MB가 부족해 bus error 발생.
    # 8GB로 상향.
    shm_size: 8gb
    env_file:
      - .env
    environment:
      - TUNNEL_NAME=${TUNNEL_NAME}
      # 타임존: Node 등 TZ 환경변수를 따르는 프로세스용. /etc/localtime은
      # Dockerfile에서 같은 값으로 영구 고정되어 있으므로 둘이 일치.
      - TZ=${TZ:-Asia/Seoul}
      # HTTPS 방식 사용 시 GitHub Personal Access Token
      # - GIT_TOKEN=ghp_xxxxxxxxxxxx
    healthcheck:
      test: ["CMD", "code", "tunnel", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      # 작업 디렉토리 마운트
      - ${WORKSPACE_PATH}:/workspace

      # git config 공유 (호스트의 .gitconfig 재활용)
      - ~/.gitconfig:/root/.gitconfig:ro

      # SSH 키 공유 (git push용, SSH 방식 사용 시)
      # 호스트 UID 노출로 인한 "Bad owner or permissions" 회피를 위해
      # 별도 경로로 마운트하고 entrypoint에서 권한 보정 후 /root/.ssh로 복사
      - ~/.ssh:/root/.ssh-host:ro

      # VS Code tunnel 인증 상태 유지 (재시작 시 재로그인 방지)
      # 실제 인증 토큰은 /root/.vscode/cli/token.json 등에 저장됨
      - vscode-cli-data:/root/.vscode/cli

      # VS Code 원격 서버/익스텐션 데이터 유지 (재시작 시 재설치 방지)
      - vscode-server-data:/root/.vscode-server

      # Claude Code 인증 정보 공유 (호스트에서 로그인한 세션 재활용)
      - ~/.claude:/root/.claude

      # Study Timer 일별 JSON 저장소 (nanobot-docker가 external volume으로 공유)
      - study-timer-data:/root/.study-timer

      # HuggingFace 모델/데이터 캐시 (OpenVLA 7B 약 14-15GB).
      # 컨테이너 recreate 시 writable layer 와 함께 삭제되는 것을 막기 위해
      # named volume 으로 분리. HF_HOME 은 Dockerfile 에서 같은 경로로 고정.
      - hf-cache:/root/.cache/huggingface

      # 타임존은 Dockerfile에서 ARG TZ로 이미지에 영구 고정함.
      # 호스트의 /etc/localtime은 심볼릭 링크라 bind mount 시 컨테이너 내부
      # 심볼릭 링크와 충돌하여 IANA tz 추론을 망가뜨리므로 마운트하지 않는다.

volumes:
  vscode-cli-data:
  vscode-server-data:
  study-timer-data:
    name: study-timer-data
  hf-cache:
    name: hf-cache
